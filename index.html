<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kas Pintar System | Corporate ERP</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .page { display: none; animation: fadeIn 0.4s ease; } .page.active { display: block; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); z-index: 50; border-top: 1px solid #e2e8f0; }
        .nav-item { color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 20%; text-transform: uppercase; }
        .nav-item.active { color: #0f4c81; transform: translateY(-3px); }
        input, select, button { outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #0f4c81; box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.15); }
        
        @media print {
            body { background: white; padding: 0 !important; margin: 0 !important; font-size: 10pt; color: #000; position: relative; overflow: visible; }
            .no-print, .bottom-nav { display: none !important; }
            .page { display: none !important; margin: 0 !important; padding: 0 !important; }
            .page.active { display: block !important; page-break-after: auto; }
            .print-header { border-bottom: 3px double #000; padding-bottom: 15px; margin-bottom: 20px; display: flex !important; justify-content: space-between; align-items: center; }
            .print-title { font-size: 22px; font-weight: 900; color: #000 !important; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
            table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 10pt; }
            th, td { border: 1px solid #000; padding: 8px 10px; text-align: left; }
            th { background-color: #f1f5f9 !important; font-weight: 800; text-transform: uppercase; -webkit-print-color-adjust: exact; }
            .ttd-area { display: flex !important; justify-content: space-between; margin-top: 50px; text-align: center; page-break-inside: avoid; }
            
            /* WATERMARK FIX - ANTI KEPOTONG */
            body::before { 
                content: attr(data-watermark); 
                position: fixed; 
                top: 50%; 
                left: 50%; 
                transform: translate(-50%, -50%) rotate(-35deg); 
                font-size: 55pt; 
                font-weight: 900; 
                color: rgba(0, 0, 0, 0.035); 
                z-index: -1; 
                pointer-events: none; 
                text-transform: uppercase; 
                white-space: nowrap;
                width: 250%; /* Lebar ekstra agar rotasi tidak memotong teks */
                text-align: center;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body class="pb-28" data-watermark="OFFICIAL REPORT">

    <div class="bg-slate-900 text-white p-6 rounded-b-3xl shadow-xl relative overflow-hidden no-print">
        <div class="absolute -right-4 -top-4 text-8xl opacity-10"><i class="fas fa-building-columns"></i></div>
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black tracking-wide" id="h-pt">KAS PINTAR</h1>
                <p class="text-[10px] font-bold opacity-80 mt-1 tracking-widest uppercase text-blue-300">CORPORATE STANDARD</p>
            </div>
            <a href="./akuntan.html" class="mt-2 bg-slate-800 hover:bg-slate-700 text-white px-2 py-1 rounded text-[9px] font-black border border-slate-600 shadow-md transition-colors"><i class="fas fa-exchange-alt mr-1"></i> AUDIT</a>
        </div>
    </div>

    <div id="p-home" class="page active px-4 mt-5">
        <div class="bg-gradient-to-br from-blue-900 to-slate-800 p-6 rounded-2xl shadow-lg text-center text-white mb-5 border border-slate-700">
            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Aktiva Lancar / Current Assets</p>
            <h1 id="v-saldo" class="text-4xl font-black tracking-tight">Rp 0</h1>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-5 text-center">
            <div class="bg-white p-3 rounded-xl border border-slate-200"><div class="text-[9px] font-black text-slate-500 uppercase">Pendapatan</div><div class="text-lg font-black text-emerald-600" id="m-pendapatan">0</div></div>
            <div class="bg-white p-3 rounded-xl border border-slate-200"><div class="text-[9px] font-black text-slate-500 uppercase">Beban</div><div class="text-lg font-black text-red-600" id="m-beban">0</div></div>
            <div class="bg-white p-3 rounded-xl border border-slate-200"><div class="text-[9px] font-black text-slate-500 uppercase">Laba Bersih</div><div class="text-lg font-black" id="m-laba">0</div></div>
            <div class="bg-white p-3 rounded-xl border border-slate-200"><div class="text-[9px] font-black text-slate-500 uppercase">Utang</div><div class="text-lg font-black text-orange-600" id="m-utang">0</div></div>
        </div>

        <div class="bg-white p-5 rounded-xl border-t-4 border-t-blue-600 shadow-lg mb-8">
            <h3 class="font-black text-blue-900 text-sm uppercase mb-4">Entry Transaksi</h3>
            <input type="number" id="inp-amt" placeholder="Nominal" class="w-full p-3 mb-3 border rounded-lg font-bold bg-slate-50 shadow-inner">
            <input type="text" id="inp-desc" placeholder="Keterangan" class="w-full p-3 mb-3 border rounded-lg text-sm">
            <select id="inp-cat" class="w-full p-3 mb-3 border rounded-lg text-sm font-bold">
                <option value="Operasional">Aktivitas Operasional</option>
                <option value="Utang">Aktivitas Utang</option>
                <option value="Modal">Aktivitas Modal</option>
            </select>
            <input type="date" id="inp-date" class="w-full p-3 mb-4 border rounded-lg font-bold">
            <div class="flex gap-3">
                <button onclick="catat('in')" class="flex-1 bg-emerald-600 text-white font-black py-3 rounded-lg text-xs">DEBIT</button>
                <button onclick="catat('out')" class="flex-1 bg-rose-600 text-white font-black py-3 rounded-lg text-xs">KREDIT</button>
            </div>
        </div>
    </div>

    <div id="p-buku" class="page px-4 mt-5">
        <div class="bg-white rounded-xl border p-4 print:border-none print:p-0">
            <div class="print-header hidden">
                <div class="w-1/4 flex justify-start"><img class="pr-logo" src="" style="max-height: 60px; object-fit: contain; display:none;"></div>
                <div class="w-1/2 text-center"><h1 class="print-title" id="kop-buku-toko">NAMA PT</h1><p class="text-xs font-bold" id="kop-buku-tgl"></p></div>
                <div class="w-1/4 flex flex-col items-end"><img id="pr-qr-buku" src="" class="w-14 h-14 border p-0.5"><div class="text-[6px] font-black uppercase mt-1">Verified System</div></div>
            </div>
            <div class="no-print mb-4 flex justify-between items-center"><h3 class="font-black text-sm uppercase">Jurnal Kas</h3><button onclick="cetakPDF('Buku_Besar')" class="bg-slate-800 text-white px-3 py-1.5 rounded text-xs font-bold">PRINT PDF</button></div>
            <div class="overflow-x-auto text-xs" id="view-buku"></div>
            <div class="ttd-area hidden"><div class="w-1/3 border-t border-black pt-1 text-xs font-black">Auditor</div><div class="w-1/3 border-t border-black pt-1 text-xs font-black ttd-nama-1">CFO</div></div>
        </div>
    </div>

    <div id="p-seting" class="page px-4 mt-5 no-print">
        <div class="bg-white rounded-xl border p-5 mb-5 shadow-sm">
            <h3 class="font-black text-sm uppercase border-b pb-3 mb-4">Konfigurasi</h3>
            <label class="text-[10px] font-black text-rose-600 block mb-1">LOCK DATA (TUTUP BUKU)</label>
            <input type="date" id="set-lock-date" class="w-full p-3 mb-5 border border-rose-200 rounded-xl font-bold bg-rose-50" onchange="simpanSet()">
            <label class="text-[10px] font-black text-slate-500 block mb-1">NAMA PERUSAHAAN</label>
            <input type="text" id="set-toko" class="w-full p-3 mb-4 border rounded text-sm font-bold" oninput="simpanSet()">
            <label class="text-[10px] font-black text-slate-500 block mb-1">LOGO KOP SURAT</label>
            <input type="file" accept="image/*" class="w-full text-xs p-2 border rounded bg-slate-50" onchange="handleLogo(this)">
            <label class="text-[10px] font-black text-slate-500 block mt-4 mb-1">NAMA PIMPINAN (TTD)</label>
            <input type="text" id="set-bos" class="w-full p-3 mb-6 border rounded text-sm font-bold" oninput="simpanSet()">
            <button onclick="exportFullBackup()" class="w-full bg-slate-800 text-white py-3 rounded-lg text-[10px] font-black">BACKUP DATA (.JSON)</button>
        </div>
    </div>

    <div class="text-center pt-8 pb-16 text-slate-400 text-[10px] font-black tracking-widest uppercase w-full no-print">&copy; 2026 Ikram Cyber System</div>

    <nav class="bottom-nav no-print">
        <button class="nav-item active" onclick="bukaTab('home')"><i class="fas fa-chart-line text-lg mb-1"></i>Dash</button>
        <button class="nav-item" onclick="bukaTab('buku')"><i class="fas fa-book text-lg mb-1"></i>Jurnal</button>
        <button class="nav-item" onclick="bukaTab('seting')"><i class="fas fa-cogs text-lg mb-1"></i>Seting</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('kspro_db')) || [];
        const formatCurr = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        let dateObj = new Date(); let offset = dateObj.getTimezoneOffset() * 60000;
        let localISOTime = (new Date(Date.now() - offset)).toISOString().slice(0, 10);
        document.getElementById('inp-date').value = localISOTime;

        function simpan() { localStorage.setItem('kspro_db', JSON.stringify(db)); perbaruiSemua(); }
        function simpanSet() { localStorage.setItem('kspro_toko', document.getElementById('set-toko').value); localStorage.setItem('kspro_bos', document.getElementById('set-bos').value); localStorage.setItem('kspro_lock', document.getElementById('set-lock-date').value); perbaruiSemua(); }
        function handleLogo(i) { if (i.files && i.files[0]) { let r = new FileReader(); r.onload = (e) => { localStorage.setItem('kspro_logo', e.target.result); perbaruiSemua(); }; r.readAsDataURL(i.files[0]); } }
        function hapusLogo() { localStorage.removeItem('kspro_logo'); perbaruiSemua(); }

        function catat(j) { 
            let n = parseInt(document.getElementById('inp-amt').value), t = document.getElementById('inp-date').value; 
            let lock = localStorage.getItem('kspro_lock'); if(lock && t <= lock) return alert("PERIODE DIKUNCI.");
            if(!n || n <= 0) return alert("Wajib isi nominal!");
            db.push({ id: Date.now(), tgl: t, ket: document.getElementById('inp-desc').value || "Entry", kat: document.getElementById('inp-cat').value, nom: n, jen: j }); 
            document.getElementById('inp-amt').value = ""; document.getElementById('inp-desc').value = ""; simpan();
        }

        function hapusJurnal(id) { 
            let itm = db.find(x => x.id === id); let lock = localStorage.getItem('kspro_lock');
            if(lock && itm.tgl <= lock) return alert("DIKUNCI.");
            if(confirm("Hapus?")) { db = db.filter(x => x.id !== id); simpan(); } 
        }

        function tampilkanTabelBuku(data) { 
            let lock = localStorage.getItem('kspro_lock');
            let h = `<table class="w-full"><thead><tr class="bg-slate-100 text-[9px]"><th>TGL</th><th>KET</th><th class="text-right">DEBIT</th><th class="text-right">KREDIT</th></tr></thead><tbody>`; 
            data.sort((a,b)=>a.id-b.id).forEach(x => { 
                let isD = x.jen === 'in'; let isL = lock && x.tgl <= lock;
                h += `<tr><td>${x.tgl}</td><td>${x.ket} ${isL?'':'<button onclick="hapusJurnal('+x.id+')" class="no-print text-rose-300">×</button>'}</td><td class="text-right">${isD ? formatCurr(x.nom) : '-'}</td><td class="text-right">${!isD ? formatCurr(x.nom) : '-'}</td></tr>`; 
            }); 
            document.getElementById('view-buku').innerHTML = h + `</tbody></table>`; 
        }

        function perbaruiSemua() { 
            let saldo=0, pin=0, out=0, ut_in=0, ut_out=0;
            db.forEach(x => { saldo+=(x.jen==='in'?x.nom:-x.nom); if(x.kat==='Operasional') x.jen==='in'?pin+=x.nom:out+=x.nom; if(x.kat==='Utang') x.jen==='in'?ut_in+=x.nom:ut_out+=x.nom; });
            document.getElementById('v-saldo').innerText = formatCurr(saldo);
            document.getElementById('m-pendapatan').innerText = formatCurr(pin);
            document.getElementById('m-beban').innerText = formatCurr(out);
            document.getElementById('m-laba').innerText = formatCurr(pin-out);
            document.getElementById('m-utang').innerText = formatCurr(ut_in-ut_out);
            
            let toko = localStorage.getItem('kspro_toko') || "NAMA PERUSAHAAN";
            document.body.setAttribute('data-watermark', toko.toUpperCase());
            document.getElementById('h-pt').innerText = toko.toUpperCase();
            document.getElementById('set-toko').value = toko!=="NAMA PERUSAHAAN"?toko:"";
            document.getElementById('set-bos').value = localStorage.getItem('kspro_bos') || "";
            document.getElementById('set-lock-date').value = localStorage.getItem('kspro_lock') || "";
            document.querySelectorAll('.ttd-nama-1, .pr-toko').forEach(e => e.innerText = toko.toUpperCase());
            document.getElementById('kop-buku-tgl').innerText = "Dicetak: " + new Date().toLocaleDateString();
            document.getElementById('pr-qr-buku').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=SYSTEM_${toko}_${Date.now()}`;
            
            let l = localStorage.getItem('kspro_logo');
            if(l) { document.querySelectorAll('.pr-logo').forEach(i=>{i.src=l;i.style.display='block';}); }
            else { document.querySelectorAll('.pr-logo').forEach(i=>i.style.display='none'); }
            tampilkanTabelBuku(db);
        }
        function cetakPDF(n) { document.title = n; window.print(); }
        function bukaTab(id) { document.querySelectorAll('.page, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById('p-'+id).classList.add('active'); event.currentTarget.classList.add('active'); }
        perbaruiSemua();
    </script>
</body>
</html>
