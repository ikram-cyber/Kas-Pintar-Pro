<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corporate Audit | Ikram Cyber System</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .page { display: none; animation: fadeIn 0.4s ease; } .page.active { display: block; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(15px)} to {opacity:1; transform:translateY(0)} }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 50; border-top: 1px solid #e2e8f0; }
        .nav-item { color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 25%; text-transform: uppercase; }
        .nav-item.active { color: #10b981; transform: translateY(-4px); }
        .table-pro { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #cbd5e1; }
        .table-pro th, .table-pro td { border: 1px solid #e2e8f0; padding: 10px; }
        .table-pro th { background-color: #1e293b; color: #f8fafc; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        @media print {
            @page { size: landscape; margin: 1cm; }
            body { background: white; padding: 0 !important; position: relative; }
            .no-print, .bottom-nav { display: none !important; }
            .page { display: none !important; } .page.active { display: block !important; }
            .print-header { display: flex !important; justify-content: space-between; align-items: center; border-bottom: 3px double #000; padding-bottom: 15px; margin-bottom: 20px; }
            table { font-size: 8px !important; width: 100% !important; border-collapse: collapse; }
            .overflow-x-auto { overflow: visible !important; }
            .ttd-area { display: flex !important; justify-content: space-between; margin-top: 40px; page-break-inside: avoid; color: #000; text-align: center; }
            .ttd-box { width: 30%; }
            body::before { content: attr(data-watermark); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 80pt; font-weight: 900; color: rgba(0, 0, 0, 0.03); z-index: -1; pointer-events: none; text-transform: uppercase; }
        }
    </style>
</head>
<body class="pb-24" data-watermark="AUDITED REPORT">

    <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-900 text-white p-6 rounded-b-3xl shadow-2xl relative overflow-hidden no-print z-[60]">
        <div class="absolute -right-6 -top-6 text-9xl opacity-10"><i class="fas fa-balance-scale-right"></i></div>
        <div class="flex justify-between items-start relative z-10">
            <div>
                <h1 class="text-2xl font-black tracking-wide text-emerald-400"><i class="fas fa-shield-halved mr-1"></i> CORPORATE AUDIT</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest text-emerald-100 mt-1 h-pt-pro">PERUSAHAAN</p>
            </div>
            <a href="index.html" class="bg-white/10 backdrop-blur-sm border border-white/20 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-[10px] font-black shadow-xl transition-all active:scale-95"><i class="fas fa-exchange-alt mr-1"></i> STANDAR</a>
        </div>
    </div>

    <div id="p-input" class="page active px-4 mt-6">
        <div class="grid grid-cols-1 gap-3 mb-4">
            <div class="bg-gradient-to-r from-emerald-600 to-teal-600 p-4 rounded-2xl shadow-md text-center text-white border border-emerald-400">
                <div class="text-[10px] font-black uppercase tracking-widest opacity-90 mb-1">Total Aktiva (Aset)</div>
                <div class="text-2xl font-black" id="v-aset-pro">Rp 0</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl border-t-4 border-t-emerald-500 shadow-xl mb-5">
            <h3 class="font-black text-slate-800 text-sm uppercase mb-5 tracking-wide">Posting Jurnal</h3>
            <input type="date" id="j-tgl" class="w-full p-3 mb-4 border border-slate-300 rounded-xl text-sm font-bold bg-slate-50 outline-none">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <select id="j-debit" class="w-full p-3 border border-emerald-300 rounded-xl text-xs font-bold bg-emerald-50/50"></select>
                <select id="j-kredit" class="w-full p-3 border border-rose-300 rounded-xl text-xs font-bold bg-rose-50/50"></select>
            </div>
            <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-3 rounded-xl border border-indigo-200 mb-4 shadow-sm">
                <label class="flex items-center gap-2 text-[10px] font-black uppercase text-indigo-800 cursor-pointer">
                    <input type="checkbox" id="j-is-ajp" class="w-4 h-4 rounded text-indigo-600"> Tandai sebagai AJP
                </label>
            </div>
            <input type="number" id="j-nom" placeholder="Nominal Rp" class="w-full p-4 mb-3 border border-slate-300 rounded-xl font-black text-center text-xl shadow-inner">
            <input type="text" id="j-ket" placeholder="Keterangan..." class="w-full p-3 mb-5 border border-slate-300 rounded-xl text-sm">
            <button onclick="simpanJurnal()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl text-xs shadow-lg transition-transform active:scale-95">POSTING JURNAL</button>
        </div>
    </div>

    <div id="p-seting" class="page px-4 mt-6 no-print">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-lg mb-5">
            <h3 class="font-black text-slate-800 text-sm uppercase border-b border-slate-100 pb-3 mb-5"><i class="fas fa-lock mr-2 text-rose-500"></i> Audit Lock (Tutup Buku)</h3>
            
            <label class="text-[10px] font-black text-rose-600 uppercase tracking-widest mb-1 block">Kunci Periode Audit</label>
            <input type="date" id="set-lock-date-pro" class="w-full p-3 mb-5 border border-rose-200 rounded-xl text-sm font-bold bg-rose-50" onchange="simpanSetPro()">

            <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block">Logo & Identitas</label>
            <input type="file" accept="image/*" class="w-full text-xs mb-2 p-2 border border-slate-300 rounded-xl bg-slate-50" onchange="handleLogo(this)">
            <div id="logo-preview-container-pro" class="hidden mb-4 p-3 border rounded-xl bg-white text-center">
                <img id="logo-preview-img-pro" src="" class="h-12 mx-auto mb-2 object-contain">
                <button onclick="hapusLogo()" class="text-rose-600 text-[10px] font-black">Hapus Logo</button>
            </div>
            <input type="text" id="set-toko-pro" placeholder="Nama PT" class="w-full p-3 mb-4 border border-slate-300 rounded-xl font-bold" oninput="simpanSetPro()">
            <input type="text" id="set-bos-pro" placeholder="Nama CFO" class="w-full p-3 mb-8 border border-slate-300 rounded-xl font-bold" oninput="simpanSetPro()">

            <div class="flex gap-2">
                <button onclick="exportFullBackup()" class="flex-1 bg-indigo-50 text-indigo-700 py-4 rounded-xl text-[10px] font-black border border-indigo-200">BACKUP</button>
                <label class="flex-1 bg-emerald-50 text-emerald-700 py-4 rounded-xl text-[10px] font-black border border-emerald-200 text-center cursor-pointer">RESTORE<input type="file" class="hidden" onchange="importFullBackup(this)"></label>
            </div>
        </div>
        <div class="text-center py-6 text-slate-400 text-[10px] font-black tracking-widest uppercase mb-10 no-print">&copy; 2026 Ikram Cyber System</div>
    </div>

    <div id="p-jurnal" class="page px-4 mt-6">
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-lg">
            <div class="print-header hidden">
                <div class="w-1/4 flex justify-start"><img class="pr-logo-pro" src="" style="max-height:60px; display:none;"></div>
                <div class="w-1/2 text-center"><h1 class="text-xl font-black pr-toko">PT NAME</h1><p class="text-xs font-bold text-slate-700">Laporan Jurnal Umum</p><p class="text-[9px] pr-date"></p></div>
                <div class="w-1/4 flex justify-end"><img class="pr-qr w-14 h-14 border border-black p-0.5" src=""></div>
            </div>
            <div class="overflow-x-auto rounded-xl border"><table class="table-pro w-full"><tbody id="v-jurnal"></tbody></table></div>
        </div>
    </div>
    <div id="p-worksheet" class="page px-4 mt-6"><div class="bg-white rounded-2xl p-5 shadow-lg overflow-hidden"><div class="print-header hidden"><div class="w-1/4 flex justify-start"><img class="pr-logo-pro" src="" style="max-height:60px; display:none;"></div><div class="w-1/2 text-center"><h1 class="text-xl font-black pr-toko">PT NAME</h1><p class="text-xs font-bold text-slate-700">10-Column Worksheet</p><p class="text-[9px] pr-date"></p></div><div class="w-1/4 justify-end flex"><img class="pr-qr w-14 h-14 border border-black p-0.5" src=""></div></div><div class="overflow-x-auto pb-2 rounded-xl border border-slate-200"><table class="table-pro" style="min-width:1100px"><thead><tr><th rowspan="2">Ref</th><th rowspan="2">Nama</th><th colspan="2">NS</th><th colspan="2">AJP</th><th colspan="2">NSD</th><th colspan="2">LR</th><th colspan="2">NR</th></tr><tr><th>D</th><th>K</th><th>D</th><th>K</th><th>D</th><th>K</th><th>D</th><th>K</th><th>D</th><th>K</th></tr></thead><tbody id="v-lajur"></tbody><tfoot id="v-lajur-foot" class="font-black bg-slate-50"></tfoot></table></div></div></div>

    <nav class="bottom-nav no-print">
        <button class="nav-item active" onclick="bukaTab('input')"><i class="fas fa-brain mb-1 text-lg"></i>Audit</button>
        <button class="nav-item" onclick="bukaTab('jurnal')"><i class="fas fa-book mb-1 text-lg"></i>Jurnal</button>
        <button class="nav-item" onclick="bukaTab('worksheet')"><i class="fas fa-table mb-1 text-lg"></i>Lajur</button>
        <button class="nav-item" onclick="bukaTab('seting')"><i class="fas fa-cogs mb-1 text-lg"></i>Seting</button>
    </nav>

    <script>
        const COA = [ { no: '101', nama: 'Kas / Bank', tipe: 'Aset', sn: 'D' }, { no: '102', nama: 'Piutang', tipe: 'Aset', sn: 'D' }, { no: '103', nama: 'Persediaan', tipe: 'Aset', sn: 'D' }, { no: '121', nama: 'Aset Tetap', tipe: 'Aset', sn: 'D' }, { no: '122', nama: 'Akum. Penyusutan', tipe: 'Aset', sn: 'K' }, { no: '201', nama: 'Utang Dagang', tipe: 'Kewajiban', sn: 'K' }, { no: '205', nama: 'Utang PPN', tipe: 'Kewajiban', sn: 'K' }, { no: '301', nama: 'Modal Ekuitas', tipe: 'Ekuitas', sn: 'K' }, { no: '302', nama: 'Prive', tipe: 'Ekuitas', sn: 'D' }, { no: '401', nama: 'Pendapatan', tipe: 'Pendapatan', sn: 'K' }, { no: '501', nama: 'Beban Gaji', tipe: 'Beban', sn: 'D' }, { no: '502', nama: 'Beban Operasional', tipe: 'Beban', sn: 'D' } ];
        let dbPro = JSON.parse(localStorage.getItem('kspro_db_pro')) || [];
        const formatRp = (n) => n ? new Intl.NumberFormat('id-ID').format(n) : '0';

        function handleLogo(input) { if (input.files && input.files[0]) { let reader = new FileReader(); reader.onload = (e) => { localStorage.setItem('kspro_logo', e.target.result); updateUI(); }; reader.readAsDataURL(input.files[0]); } }
        function hapusLogo() { localStorage.removeItem('kspro_logo'); updateUI(); }
        function simpanSetPro() { localStorage.setItem('kspro_toko', document.getElementById('set-toko-pro').value); localStorage.setItem('kspro_bos', document.getElementById('set-bos-pro').value); localStorage.setItem('kspro_lock_pro', document.getElementById('set-lock-date-pro').value); updateUI(); }

        function simpanJurnal() {
            let nom = parseInt(document.getElementById('j-nom').value);
            let tgl = document.getElementById('j-tgl').value;
            let lockDate = localStorage.getItem('kspro_lock_pro');
            if(lockDate && tgl <= lockDate) return alert("PERIODE DIKUNCI: Data periode ini sudah masuk tahap Audit Final.");
            let id = Date.now();
            dbPro.push({id, grp: id, tgl, ref:document.getElementById('j-debit').value, pos:'D', nom, ket:document.getElementById('j-ket').value, isAjp:document.getElementById('j-is-ajp').checked});
            dbPro.push({id:id+1, grp: id, tgl, ref:document.getElementById('j-kredit').value, pos:'K', nom, ket:document.getElementById('j-ket').value, isAjp:document.getElementById('j-is-ajp').checked});
            localStorage.setItem('kspro_db_pro', JSON.stringify(dbPro)); render();
        }

        function hapusJurnal(grpId) {
            let items = dbPro.filter(x => x.grp === grpId);
            let lockDate = localStorage.getItem('kspro_lock_pro');
            if(lockDate && items[0].tgl <= lockDate) return alert("PERIODE DIKUNCI: Hubungi admin untuk membongkar audit lama.");
            if(confirm("Hapus jurnal ini?")) { dbPro = dbPro.filter(x => x.grp !== grpId); localStorage.setItem('kspro_db_pro', JSON.stringify(dbPro)); render(); }
        }

        function updateUI() {
            let toko = localStorage.getItem('kspro_toko') || "NAMA PERUSAHAAN";
            let lockDate = localStorage.getItem('kspro_lock_pro') || "";
            document.body.setAttribute('data-watermark', toko);
            document.querySelectorAll('.pr-toko').forEach(el => el.innerText = toko.toUpperCase());
            document.getElementById('set-lock-date-pro').value = lockDate;
            let logoSrc = localStorage.getItem('kspro_logo');
            document.querySelectorAll('.pr-logo-pro').forEach(img => { if(logoSrc) { img.src = logoSrc; img.style.display = 'block'; } else { img.style.display = 'none'; } });
            if(logoSrc) { document.getElementById('logo-preview-container-pro').classList.remove('hidden'); document.getElementById('logo-preview-img-pro').src = logoSrc; } else { document.getElementById('logo-preview-container-pro').classList.add('hidden'); }
            document.querySelectorAll('.pr-date').forEach(el => el.innerText = "Dicetak: " + new Date().toLocaleString());
            document.querySelectorAll('.pr-qr').forEach(img => img.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=AUDIT_" + toko + "_" + Date.now());
        }

        function render() {
            let hJ = '', hL = '', totals = Array(12).fill(0), totalAset = 0;
            let lockDate = localStorage.getItem('kspro_lock_pro');
            let groups = [...new Set(dbPro.map(item => item.grp))];
            groups.forEach(grp => {
                let items = dbPro.filter(x => x.grp === grp);
                items.forEach((x, idx) => {
                    let isLocked = lockDate && x.tgl <= lockDate;
                    let hapusBtn = (idx===0 && !isLocked) ? `<button onclick="hapusJurnal(${x.grp})" class="text-rose-300 no-print"><i class="fas fa-trash"></i></button>` : '';
                    hJ += `<tr class="border-b"><td class="p-2">${x.tgl}</td><td class="p-2">${x.ref}</td><td class="p-2">${COA.find(a=>a.no===x.ref).nama} ${x.isAjp?'[AJP]':''} ${hapusBtn}</td><td class="p-2 text-right">${x.pos==='D'?formatRp(x.nom):'-'}</td><td class="p-2 text-right">${x.pos==='K'?formatRp(x.nom):'-'}</td></tr>`;
                });
            });
            document.getElementById('v-jurnal').innerHTML = hJ;
            COA.forEach(akun => {
                let nsD = dbPro.filter(x => x.ref===akun.no && x.pos==='D' && !x.isAjp).reduce((a,b)=>a+b.nom,0);
                let nsK = dbPro.filter(x => x.ref===akun.no && x.pos==='K' && !x.isAjp).reduce((a,b)=>a+b.nom,0);
                let ajpD = dbPro.filter(x => x.ref===akun.no && x.pos==='D' && x.isAjp).reduce((a,b)=>a+b.nom,0);
                let ajpK = dbPro.filter(x => x.ref===akun.no && x.pos==='K' && x.isAjp).reduce((a,b)=>a+b.nom,0);
                let nsdD = (nsD + ajpD), nsdK = (nsK + ajpK);
                if(akun.tipe==='Aset') totalAset += (nsdD - nsdK);
                if(nsD || nsK || ajpD || ajpK) hL += `<tr><td class="text-center">${akun.no}</td><td>${akun.nama}</td><td class="text-right">${formatRp(nsD)}</td><td class="text-right">${formatRp(nsK)}</td><td class="text-right">${formatRp(ajpD)}</td><td class="text-right">${formatRp(ajpK)}</td><td class="text-right font-bold">${formatRp(nsdD)}</td><td class="text-right font-bold">${formatRp(nsdK)}</td><td colspan="4">-</td></tr>`;
            });
            document.getElementById('v-lajur').innerHTML = hL;
            document.getElementById('v-aset-pro').innerText = "Rp " + formatRp(totalAset);
            updateUI();
        }
        function bukaTab(id) { document.querySelectorAll('.page, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById('p-'+id).classList.add('active'); event.currentTarget.classList.add('active'); }
        window.onload = () => { 
            let opt = ''; COA.forEach(a => opt += `<option value="${a.no}">${a.no} - ${a.nama}</option>`);
            document.getElementById('j-debit').innerHTML = opt; document.getElementById('j-kredit').innerHTML = opt;
            document.getElementById('j-tgl').value = localISOTime;
            document.getElementById('set-toko-pro').value = localStorage.getItem('kspro_toko') || "";
            document.getElementById('set-bos-pro').value = localStorage.getItem('kspro_bos') || "";
            render(); 
        };
    </script>
</body>
</html>
