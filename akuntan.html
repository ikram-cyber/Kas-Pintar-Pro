<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akuntan Pro | Ikram Cyber System</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .page { display: none; animation: fadeIn 0.4s ease; } .page.active { display: block; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(15px)} to {opacity:1; transform:translateY(0)} }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 50; border-top: 1px solid #e2e8f0; }
        .nav-item { color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 25%; text-transform: uppercase; }
        .nav-item.active { color: #4f46e5; transform: translateY(-4px); }
        
        .table-pro { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #cbd5e1; }
        .table-pro th, .table-pro td { border: 1px solid #e2e8f0; padding: 10px; }
        .table-pro th { background-color: #1e293b; color: #f8fafc; font-weight: 900; text-align: center; }
        
        @media print {
            @page { size: landscape; margin: 1cm; }
            .no-print, .bottom-nav { display: none !important; }
            .page { display: none !important; } .page.active { display: block !important; }
        }
    </style>
</head>
<body class="pb-24">

    <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-950 text-white p-6 rounded-b-3xl shadow-2xl relative overflow-hidden no-print z-[60]">
        <div class="absolute -right-10 -top-10 text-9xl opacity-5"><i class="fas fa-chess-king"></i></div>
        <div class="flex justify-between items-start relative z-10">
            <div>
                <h1 class="text-2xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-200"><i class="fas fa-shield-halved mr-1"></i> AUDIT PRO</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest text-indigo-200 mt-1 h-pt-pro">PT PERUSAHAAN</p>
            </div>
            <a href="index.html" class="bg-white/10 backdrop-blur-md border border-white/20 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-[10px] font-black shadow-xl transition-all active:scale-95">
                <i class="fas fa-exchange-alt mr-1"></i> PRAKTIS
            </a>
        </div>
    </div>

    <div id="p-input" class="page active px-4 mt-6">
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-lg mb-5 flex items-center justify-between">
            <div class="pr-2">
                <div class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1"><i class="fas fa-robot"></i> AI Auditor Insight</div>
                <div id="ai-audit-desc" class="text-xs font-bold text-slate-700 leading-tight italic">Menyiapkan laporan audit...</div>
            </div>
            <div id="ai-audit-grade" class="text-3xl font-black text-slate-400">N/A</div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-4 rounded-2xl shadow-lg text-white">
                <p class="text-[9px] font-black uppercase opacity-70">Laba Bersih (NI)</p>
                <h2 id="v-laba-pro" class="text-lg font-black tracking-tight">Rp 0</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-[9px] font-black uppercase text-slate-400">ROE (DuPont)</p>
                <h2 id="v-roe-pro" class="text-lg font-black text-indigo-600">0.00%</h2>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-lg mb-6">
            <h3 class="font-black text-slate-800 text-xs uppercase mb-4 border-b pb-2">Entri Jurnal & Pajak</h3>
            <input type="date" id="j-tgl" class="w-full p-3 mb-3 border border-slate-300 rounded-xl text-sm font-bold bg-slate-50 outline-none">
            
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div><select id="j-debit" class="w-full p-3 border border-emerald-300 rounded-xl text-xs font-bold bg-emerald-50/50 outline-none"></select></div>
                <div><select id="j-kredit" class="w-full p-3 border border-rose-300 rounded-xl text-xs font-bold bg-rose-50/50 outline-none"></select></div>
            </div>

            <div class="bg-amber-50 p-3 rounded-xl border border-amber-200 mb-3 flex items-center gap-2">
                <input type="checkbox" id="j-tax-auto" class="w-4 h-4">
                <label for="j-tax-auto" class="text-[10px] font-black uppercase text-amber-800">PPN 11% Otomatis</label>
            </div>

            <input type="number" id="j-nom" placeholder="Nominal Rp" class="w-full p-4 mb-3 border border-slate-300 rounded-xl font-black text-center text-lg shadow-inner">
            <input type="text" id="j-ket" placeholder="Keterangan..." class="w-full p-3 mb-5 border border-slate-300 rounded-xl text-sm">
            
            <button onclick="simpanJurnal()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl text-xs tracking-widest shadow-lg active:scale-95 transition-all">POSTING JURNAL</button>
        </div>
    </div>

    <div id="p-jurnal" class="page px-4 mt-6">
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-sm uppercase">General Journal</h3>
                <button onclick="exportCSV('Jurnal')" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black shadow-md"><i class="fas fa-file-csv"></i> CSV</button>
            </div>
            <div class="overflow-x-auto">
                <table class="table-pro text-[11px]">
                    <thead>
                        <tr><th class="w-16">Tgl</th><th class="w-12">Ref</th><th>Keterangan Akun</th><th class="text-right">Debit</th><th class="text-right">Kredit</th><th class="no-print">X</th></tr>
                    </thead>
                    <tbody id="v-jurnal"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="p-worksheet" class="page px-4 mt-6">
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-lg overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-sm uppercase">Audit Worksheet 10-Col</h3>
                <button onclick="window.print()" class="bg-slate-800 text-white px-3 py-1 rounded text-xs font-bold"><i class="fas fa-print"></i> PDF</button>
            </div>
            <div class="overflow-x-auto pb-2">
                <table class="table-pro" style="min-width:1100px">
                    <thead>
                        <tr><th rowspan="2">Ref</th><th rowspan="2">Nama Rekening</th><th colspan="2">NS</th><th colspan="2">AJP</th><th colspan="2">NSD</th><th colspan="2">L/R</th><th colspan="2">NERACA</th></tr>
                        <tr><th>D</th><th>K</th><th>D</th><th>K</th><th>D</th><th>K</th><th>D</th><th>K</th><th>D</th><th>K</th></tr>
                    </thead>
                    <tbody id="v-lajur"></tbody>
                    <tfoot id="v-lajur-foot" class="font-black bg-slate-50"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <nav class="bottom-nav no-print">
        <button class="nav-item active" onclick="bukaTab('input')"><i class="fas fa-brain mb-1 text-lg"></i>Audit</button>
        <button class="nav-item" onclick="bukaTab('jurnal')"><i class="fas fa-list-ol mb-1 text-lg"></i>Jurnal</button>
        <button class="nav-item" onclick="bukaTab('worksheet')"><i class="fas fa-table mb-1 text-lg"></i>Lajur</button>
        <button class="nav-item" onclick="bukaTab('seting')"><i class="fas fa-cog mb-1 text-lg"></i>Seting</button>
    </nav>

    <script>
        const COA = [
            { no: '101', nama: 'Kas / Bank', tipe: 'Aset', sn: 'D' },
            { no: '102', nama: 'Piutang', tipe: 'Aset', sn: 'D' },
            { no: '121', nama: 'Peralatan', tipe: 'Aset', sn: 'D' },
            { no: '201', nama: 'Utang Dagang', tipe: 'Kewajiban', sn: 'K' },
            { no: '205', nama: 'Utang PPN', tipe: 'Kewajiban', sn: 'K' },
            { no: '301', nama: 'Modal Ekuitas', tipe: 'Ekuitas', sn: 'K' },
            { no: '401', nama: 'Pendapatan', tipe: 'Pendapatan', sn: 'K' },
            { no: '501', nama: 'Beban Operasional', tipe: 'Beban', sn: 'D' }
        ];

        let dbPro = JSON.parse(localStorage.getItem('kspro_db_pro')) || [];
        const formatRp = (n) => n ? new Intl.NumberFormat('id-ID').format(n) : '';

        function simpanJurnal() {
            let n = parseInt(document.getElementById('j-nom').value);
            let d = document.getElementById('j-debit').value;
            let k = document.getElementById('j-kredit').value;
            let t = document.getElementById('j-tgl').value;
            let ket = document.getElementById('j-ket').value;
            let tax = document.getElementById('j-tax-auto').checked;
            if(!n || !t || d==k) return alert("Cek input!");
            let id = Date.now();
            if(tax) {
                let ppn = Math.round(n * 0.11);
                dbPro.push({id, grp:id, tgl:t, ref:d, pos:'D', nom:n+ppn, ket}, {id:id+1, grp:id, tgl:t, ref:k, pos:'K', nom:n, ket}, {id:id+2, grp:id, tgl:t, ref:'205', pos:'K', nom:ppn, ket:"PPN 11%"});
            } else {
                dbPro.push({id, grp:id, tgl:t, ref:d, pos:'D', nom:n, ket}, {id:id+1, grp:id, tgl:t, ref:k, pos:'K', nom:n, ket});
            }
            localStorage.setItem('kspro_db_pro', JSON.stringify(dbPro));
            alert("Terposting!"); render();
        }

        function render() {
            let hJ = ''; let grps = [...new Set(dbPro.map(x=>x.grp))];
            grps.forEach(g => {
                dbPro.filter(x=>x.grp===g).forEach((x,i)=>{
                    hJ += `<tr class="${i===0?'border-t border-slate-200':''}"><td>${i===0?x.tgl.slice(5):''}</td><td class="text-center font-bold">${x.ref}</td><td class="${x.pos==='K'?'pl-6 italic text-slate-500':'font-bold'}">${COA.find(a=>a.no===x.ref).nama}<br><span class="text-[9px] font-normal text-slate-400">${x.ket}</span></td><td class="text-right">${x.pos==='D'?formatRp(x.nom):'-'}</td><td class="text-right">${x.pos==='K'?formatRp(x.nom):'-'}</td><td class="text-center no-print">${i===0?`<button onclick="hapus(${g})">❌</button>`:''}</td></tr>`;
                });
            });
            document.getElementById('v-jurnal').innerHTML = hJ;

            let hL = '', totals = Array(10).fill(0);
            let summary = { revenue: 0, asset: 0, equity: 0, netIncome: 0 };

            COA.forEach(akun => {
                let d = dbPro.filter(x=>x.ref===akun.no && x.pos==='D').reduce((a,b)=>a+b.nom,0);
                let k = dbPro.filter(x=>x.ref===akun.no && x.pos==='K').reduce((a,b)=>a+b.nom,0);
                let nsD = akun.sn==='D' ? Math.max(0, d-k) : 0;
                let nsK = akun.sn==='K' ? Math.max(0, k-d) : 0;
                let lrD=0, lrK=0, nrD=0, nrK=0;
                if(akun.tipe==='Pendapatan'||akun.tipe==='Beban') { lrD=nsD; lrK=nsK; } else { nrD=nsD; nrK=nsK; }
                if(d||k) {
                    hL += `<tr><td class="text-center font-bold">${akun.no}</td><td>${akun.nama}</td><td class="text-right">${formatRp(nsD)}</td><td class="text-right">${formatRp(nsK)}</td><td colspan="2">-</td><td class="text-right font-bold">${formatRp(nsD)}</td><td class="text-right font-bold">${formatRp(nsK)}</td><td class="text-right">${formatRp(lrD)}</td><td class="text-right">${formatRp(lrK)}</td><td class="text-right">${formatRp(nrD)}</td><td class="text-right">${formatRp(nrK)}</td></tr>`;
                    [nsD,nsK,0,0,nsD,nsK,lrD,lrK,nrD,nrK].forEach((v,i)=>totals[i]+=v);
                    if(akun.tipe==='Pendapatan') summary.revenue += nsK;
                    if(akun.tipe==='Aset') summary.asset += nsD;
                    if(akun.tipe==='Ekuitas') summary.equity += nsK;
                }
            });
            let laba = totals[7] - totals[6];
            summary.netIncome = laba;
            document.getElementById('v-laba-pro').innerText = formatRp(laba);
            document.getElementById('v-lajur').innerHTML = hL;
            document.getElementById('v-lajur-foot').innerHTML = `<tr class="bg-indigo-50"><td colspan="2">TOTAL BALANCE</td><td colspan="6"></td><td class="text-right">${formatRp(totals[6]+(laba>0?laba:0))}</td><td class="text-right">${formatRp(totals[7]+(laba<0?Math.abs(laba):0))}</td><td class="text-right">${formatRp(totals[8]+(laba<0?Math.abs(laba):0))}</td><td class="text-right">${formatRp(totals[9]+(laba>0?laba:0))}</td></tr>`;

            // SMART ANALYTICS (Pesaing Index.html)
            let roe = summary.equity > 0 ? (summary.netIncome / summary.equity * 100).toFixed(2) : 0;
            document.getElementById('v-roe-pro').innerText = roe + "%";
            
            let auditBox = document.getElementById('ai-audit-desc');
            let auditGrade = document.getElementById('ai-audit-grade');
            if(laba > 0 && roe > 10) { auditGrade.innerText = "A+"; auditBox.innerText = "Performa Sangat Bagus. ROI di atas rata-rata industri."; auditGrade.className = "text-3xl font-black text-emerald-600"; }
            else if(laba > 0) { auditGrade.innerText = "B"; auditBox.innerText = "Kondisi Stabil. Laba positif, perlu efisiensi biaya."; auditGrade.className = "text-3xl font-black text-blue-600"; }
            else { auditGrade.innerText = "D"; auditBox.innerText = "Peringatan! Operasional Rugi. Cek beban pengeluaran."; auditGrade.className = "text-3xl font-black text-rose-600"; }
        }

        function hapus(g) { if(confirm("Hapus?")) { dbPro = dbPro.filter(x=>x.grp!==g); localStorage.setItem('kspro_db_pro', JSON.stringify(dbPro)); render(); } }
        function exportCSV(t) { alert("Download CSV "+t); }
        function bukaTab(id) { document.querySelectorAll('.page, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById('p-'+id).classList.add('active'); event.currentTarget.classList.add('active'); }
        window.onload = () => { 
            let opt = ''; COA.forEach(a => opt += `<option value="${a.no}">${a.no} - ${a.nama}</option>`);
            document.getElementById('j-debit').innerHTML = opt; document.getElementById('j-kredit').innerHTML = opt;
            document.getElementById('h-pt').innerText = (localStorage.getItem('kspro_toko')||"PT PERUSAHAAN").toUpperCase();
            render(); 
        };
    </script>
</body>
</html>
